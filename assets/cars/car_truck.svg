  <line x1="110" y1="12" x2="108" y2="36" stroke="currentColor" stroke-width="1.5" opacity="0.15"/>
  <!-- Внутренняя линия кузова -->
  <path d="M154,38 L154,54 L188,54 L188,38" fill="none" stroke="currentColor" stroke-width="1" opacity="0.18"/>
  <!-- Фара -->
  <ellipse cx="190" cy="44" rx="3" ry="3" fill="currentColor" opacity="0.3"/>
  <!-- Фонарь -->
  <rect x="18" y="48" width="5" height="6" rx="1" fill="currentColor" opacity="0.3"/>
  <!-- Колёса -->
  <circle cx="37" cy="64" r="14" fill="currentColor"/>
  <circle cx="37" cy="64" r="8" fill="currentColor" opacity="0.25"/>
  <circle cx="37" cy="64" r="3.5" fill="currentColor" opacity="0.45"/>
  <circle cx="167" cy="64" r="14" fill="currentColor"/>
  <circle cx="167" cy="64" r="8" fill="currentColor" opacity="0.25"/>
  <circle cx="167" cy="64" r="3.5" fill="currentColor" opacity="0.45"/>
</svg>
